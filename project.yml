name: StickerBridge
options:
  bundleIdPrefix: com.megabyte0x
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
packages:
  SDWebImage:
    url: https://github.com/SDWebImage/SDWebImage.git
    exactVersion: 5.21.7
  SDWebImageWebPCoder:
    url: https://github.com/SDWebImage/SDWebImageWebPCoder.git
    exactVersion: 0.15.0
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    exactVersion: 0.9.20
targets:
  StickerBridge:
    type: application
    platform: iOS
    sources:
      - StickerBridge
      - Shared
    info:
      path: StickerBridge/Info.plist
      properties:
        CFBundleDisplayName: StickerBridge
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: APPL
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleURLTypes:
          - CFBundleURLName: com.megabyte0x.stickerbridge
            CFBundleURLSchemes:
              - stickerbridge
        UILaunchScreen: {}
    entitlements:
      path: StickerBridge/StickerBridge.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.megabyte0x.stickerbridge
    dependencies:
      - package: SDWebImage
      - package: SDWebImageWebPCoder
      - package: ZIPFoundation
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.megabyte0x.stickerbridge
        PRODUCT_NAME: StickerBridge
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
  StickerBridgeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - StickerBridgeTests
    dependencies:
      - target: StickerBridge
      - package: SDWebImage
      - package: SDWebImageWebPCoder
      - package: ZIPFoundation
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.megabyte0x.stickerbridge.tests
        GENERATE_INFOPLIST_FILE: YES
  StickerBridgeUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - StickerBridgeUITests
    dependencies:
      - target: StickerBridge
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.megabyte0x.stickerbridge.uitests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  StickerBridge:
    build:
      targets:
        StickerBridge: all
        StickerBridgeTests: [test]
        StickerBridgeUITests: [test]
    test:
      gatherCoverageData: true
      targets:
        - StickerBridgeTests
        - StickerBridgeUITests
