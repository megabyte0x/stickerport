name: StickerBridge
options:
  bundleIdPrefix: com.megabyte0x
  deploymentTarget:
    iOS: "17.0"
    macOS: "15.0"
  xcodeVersion: "26.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
packages:
  SDWebImage:
    url: https://github.com/SDWebImage/SDWebImage.git
    exactVersion: 5.21.7
  SDWebImageWebPCoder:
    url: https://github.com/SDWebImage/SDWebImageWebPCoder.git
    exactVersion: 0.15.0
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    exactVersion: 0.9.20
targets:
  StickerBridge:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - StickerBridge
      - Shared
    info:
      path: StickerBridge/Info.plist
      properties:
        CFBundleDisplayName: StickerBridge
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: APPL
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleURLTypes:
          - CFBundleURLName: com.megabyte0x.stickerbridge
            CFBundleURLSchemes:
              - stickerbridge
        UILaunchScreen: {}
    entitlements:
      path: StickerBridge/StickerBridge.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.megabyte0x.stickerbridge
    dependencies:
      - package: SDWebImage
      - package: SDWebImageWebPCoder
      - package: ZIPFoundation
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.megabyte0x.stickerbridge
        PRODUCT_NAME: StickerBridge
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
  StickerBridgeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - StickerBridgeTests
    dependencies:
      - target: StickerBridge
      - package: SDWebImage
      - package: SDWebImageWebPCoder
      - package: ZIPFoundation
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.megabyte0x.stickerbridge.tests
        GENERATE_INFOPLIST_FILE: YES
  StickerBridgeUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - StickerBridgeUITests
    dependencies:
      - target: StickerBridge
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.megabyte0x.stickerbridge.uitests
        GENERATE_INFOPLIST_FILE: YES
  StickerBridgeMac:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: StickerBridgeMac
        excludes:
          - Info.plist
          - StickerBridgeMac.entitlements
      - path: StickerBridge/Domain
      - path: Shared
    info:
      path: StickerBridgeMac/Info.plist
      properties:
        CFBundleDevelopmentRegion: $(DEVELOPMENT_LANGUAGE)
        CFBundleDisplayName: StickerPort
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: APPL
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
    entitlements:
      path: StickerBridgeMac/StickerBridgeMac.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
    dependencies:
      - package: SDWebImage
      - package: SDWebImageWebPCoder
      - sdk: libsqlite3.tbd
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.megabyte0x.stickerbridge.mac
        PRODUCT_MODULE_NAME: StickerBridgeMac
        PRODUCT_NAME: StickerPort
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CURRENT_PROJECT_VERSION: 2
        MARKETING_VERSION: 0.2.1
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        ENABLE_HARDENED_RUNTIME: YES
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "-"
        Release:
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
  StickerBridgeMacTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - StickerBridgeMacTests
    dependencies:
      - target: StickerBridgeMac
      - package: SDWebImage
      - package: SDWebImageWebPCoder
      - sdk: libsqlite3.tbd
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.megabyte0x.stickerbridge.mac.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/StickerPort.app/Contents/MacOS/StickerPort
        BUNDLE_LOADER: $(TEST_HOST)
  StickerBridgeMacUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - StickerBridgeMacUITests
    dependencies:
      - target: StickerBridgeMac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.megabyte0x.stickerbridge.mac.uitests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  StickerBridge:
    build:
      targets:
        StickerBridge: all
        StickerBridgeTests: [test]
        StickerBridgeUITests: [test]
    test:
      gatherCoverageData: true
      targets:
        - StickerBridgeTests
        - StickerBridgeUITests
  StickerBridgeMac:
    build:
      targets:
        StickerBridgeMac: all
        StickerBridgeMacTests: [test]
        StickerBridgeMacUITests: [test]
    test:
      gatherCoverageData: false
      targets:
        - StickerBridgeMacTests
        - StickerBridgeMacUITests
