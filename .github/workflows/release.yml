name: Release DMG

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v-prefixed tag to publish
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  APPLE_TEAM_ID: 9UR77TD484

jobs:
  release:
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Resolve release version
        id: release
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          tag="${INPUT_TAG:-$GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must use the form v0.1.0: $tag" >&2
            exit 2
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Validate Apple release secrets
        env:
          CERTIFICATE_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          NOTARY_KEY_BASE64: ${{ secrets.APPLE_NOTARY_KEY_BASE64 }}
          NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: |
          missing=()
          [[ -n "$CERTIFICATE_BASE64" ]] || missing+=(MACOS_DEVELOPER_ID_CERTIFICATE_BASE64)
          [[ -n "$CERTIFICATE_PASSWORD" ]] || missing+=(MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD)
          [[ -n "$NOTARY_KEY_BASE64" ]] || missing+=(APPLE_NOTARY_KEY_BASE64)
          [[ -n "$NOTARY_KEY_ID" ]] || missing+=(APPLE_NOTARY_KEY_ID)
          [[ -n "$NOTARY_ISSUER_ID" ]] || missing+=(APPLE_NOTARY_ISSUER_ID)
          if (( ${#missing[@]} > 0 )); then
            echo "Missing required GitHub Actions secrets:" >&2
            printf '  - %s\n' "${missing[@]}" >&2
            exit 2
          fi

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Run macOS unit tests
        run: |
          xcodebuild \
            -project StickerBridge.xcodeproj \
            -scheme StickerBridgeMac \
            -destination 'platform=macOS' \
            -derivedDataPath .build/ci \
            -only-testing:StickerBridgeMacTests \
            CODE_SIGN_IDENTITY=- \
            DEVELOPMENT_TEAM= \
            test

      - name: Import Developer ID certificate
        id: signing
        env:
          CERTIFICATE_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          certificate_path="$RUNNER_TEMP/developer-id-application.p12"
          keychain_path="$RUNNER_TEMP/stickerport-release.keychain-db"
          keychain_password="$(openssl rand -hex 32)"

          printf '%s' "$CERTIFICATE_BASE64" | /usr/bin/base64 --decode > "$certificate_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" \
            -k "$keychain_path" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$keychain_password" \
            "$keychain_path"
          security list-keychains -d user -s "$keychain_path"

          identity="$(
            security find-identity -p codesigning -v "$keychain_path" |
              sed -n 's/.*"\(Developer ID Application:[^"]*\)"/\1/p' |
              head -n 1
          )"
          if [[ -z "$identity" ]]; then
            echo "The imported certificate does not contain a Developer ID Application identity." >&2
            exit 1
          fi
          echo "identity=$identity" >> "$GITHUB_OUTPUT"
          echo "keychain_path=$keychain_path" >> "$GITHUB_OUTPUT"
          echo "certificate_path=$certificate_path" >> "$GITHUB_OUTPUT"

      - name: Prepare notarization API key
        id: notary
        env:
          NOTARY_KEY_BASE64: ${{ secrets.APPLE_NOTARY_KEY_BASE64 }}
          NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
        run: |
          key_path="$RUNNER_TEMP/AuthKey_${NOTARY_KEY_ID}.p8"
          printf '%s' "$NOTARY_KEY_BASE64" | /usr/bin/base64 --decode > "$key_path"
          chmod 600 "$key_path"
          echo "key_path=$key_path" >> "$GITHUB_OUTPUT"

      - name: Build DMG
        env:
          RELEASE_SIGNING_IDENTITY: ${{ steps.signing.outputs.identity }}
          DEVELOPMENT_TEAM: ${{ env.APPLE_TEAM_ID }}
          NOTARY_KEY_PATH: ${{ steps.notary.outputs.key_path }}
          NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: script/release_dmg.sh "${{ steps.release.outputs.version }}"

      - name: Verify stable download asset
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
          EXPECTED_TEAM_ID: ${{ env.APPLE_TEAM_ID }}
        run: |
          cmp \
            "dist/StickerPort-${RELEASE_VERSION}.dmg" \
            dist/StickerPort.dmg
          script/verify_release_dmg.sh \
            "dist/StickerPort-${RELEASE_VERSION}.dmg" \
            "$RELEASE_VERSION"

      - name: Stage, verify, and publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
          EXPECTED_TEAM_ID: ${{ env.APPLE_TEAM_ID }}
        run: |
          retry() {
            local attempt
            for attempt in 1 2 3; do
              if "$@"; then
                return 0
              fi
              if [[ "$attempt" -eq 3 ]]; then
                return 1
              fi
              sleep "$((attempt * 10))"
            done
          }
          ensure_draft_release() {
            if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
              gh release edit "$RELEASE_TAG" --draft --verify-tag
              return 0
            fi
            gh release create "$RELEASE_TAG" \
              --draft \
              --generate-notes \
              --title "StickerPort ${RELEASE_TAG}" \
              --verify-tag
          }
          verify_dir="$(mktemp -d "$RUNNER_TEMP/StickerPort-upload.XXXXXX")"
          trap 'rm -rf "$verify_dir"' EXIT

          retry ensure_draft_release
          retry gh release upload "$RELEASE_TAG" \
            "dist/StickerPort-${RELEASE_VERSION}.dmg" \
            "dist/StickerPort-${RELEASE_VERSION}.dmg.sha256" \
            dist/StickerPort.dmg \
            dist/StickerPort.dmg.sha256 \
            --clobber
          retry gh release download "$RELEASE_TAG" \
            --dir "$verify_dir" \
            --pattern "StickerPort-${RELEASE_VERSION}.dmg" \
            --pattern "StickerPort-${RELEASE_VERSION}.dmg.sha256" \
            --pattern "StickerPort.dmg" \
            --pattern "StickerPort.dmg.sha256"

          cmp \
            "$verify_dir/StickerPort-${RELEASE_VERSION}.dmg" \
            "$verify_dir/StickerPort.dmg"
          stable_expected="$(
            awk 'NR == 1 { print $1 }' \
              "$verify_dir/StickerPort.dmg.sha256"
          )"
          stable_actual="$(
            shasum -a 256 "$verify_dir/StickerPort.dmg" |
              awk '{ print $1 }'
          )"
          if [[ -z "$stable_expected" || "$stable_actual" != "$stable_expected" ]]; then
            echo "Stable DMG checksum verification failed." >&2
            exit 1
          fi
          script/verify_release_dmg.sh \
            "$verify_dir/StickerPort-${RELEASE_VERSION}.dmg" \
            "$RELEASE_VERSION"

          retry gh release edit "$RELEASE_TAG" \
            --draft=false \
            --latest \
            --verify-tag

      - name: Remove temporary signing keychain
        if: always()
        env:
          KEYCHAIN_PATH: ${{ steps.signing.outputs.keychain_path }}
          CERTIFICATE_PATH: ${{ steps.signing.outputs.certificate_path }}
          NOTARY_KEY_PATH: ${{ steps.notary.outputs.key_path }}
        run: |
          if [[ -n "$KEYCHAIN_PATH" && -f "$KEYCHAIN_PATH" ]]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi
          if [[ -n "$CERTIFICATE_PATH" && -f "$CERTIFICATE_PATH" ]]; then
            rm -f "$CERTIFICATE_PATH"
          fi
          if [[ -n "$NOTARY_KEY_PATH" && -f "$NOTARY_KEY_PATH" ]]; then
            rm -f "$NOTARY_KEY_PATH"
          fi
